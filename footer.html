<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer Navigation</title>
    <style>
        .footer {
            width: 100%;
            background-color: #222;
            color: white;
            padding: 20px;
            text-align: center;
            margin-top: 50px;
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }
        .footer-links a {
            color: #bbb;
            text-decoration: none;
            font-size: 14px;
        }
        .footer-links a:hover {
            color: white;
        }
        .footer-info {
            font-size: 12px;
            color: #888;
            border-top: 1px solid #444;
            padding-top: 15px;
        }
    </style>
</head>
<body>
    <div class="footer">
        <div class="footer-content">
            <div class="footer-links">
                <a href="#privacy">Privacy Policy</a>
                <a href="#terms">Terms of Service</a>
                <a href="#sitemap">Sitemap</a>
                <a href="#rss">RSS Feed</a>
            </div>
            <div class="footer-info">
                <p>&copy; 2026 Project UTS Frontend. All rights reserved.</p>
                <p>Created by Tim Teknik Informatika UNRI</p>
            </div>
        </div>
    </div>
</body>
</html>
